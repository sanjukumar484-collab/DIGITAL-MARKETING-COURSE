<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>₹51 Course</title>

<style>

body{
margin:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:Arial, sans-serif;
}

.container{
width:95%;
max-width:900px;
text-align:center;
}

.course-img{
width:100%;
border-radius:15px;
cursor:pointer;
box-shadow:0 10px 35px rgba(0,0,0,0.6);
transition:0.4s;
}

.course-img:hover{
transform:scale(1.02);
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<img src="course51.png" class="course-img" id="courseImage">

<div class="hidden" id="paymentBox">

<form>
<script src="https://checkout.razorpay.com/v1/payment-button.js"
data-payment_button_id="pl_SRC6QrXaO1u6Lz"
async>
</script>
</form>

</div>

</div>

<script>

function openPayment(){
let btn=document.querySelector("#paymentBox form button");
if(btn){
btn.click();
}
}

document.getElementById("courseImage").addEventListener("click",openPayment);

</script>

</body>
</html>
