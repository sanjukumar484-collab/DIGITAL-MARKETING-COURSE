<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>₹51 Course Offer</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:900px;
text-align:center;
}

.course-img{
width:100%;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
cursor:pointer;
transition:0.4s;
}

.course-img:hover{
transform:scale(1.02);
}

.enroll-btn{
margin-top:20px;
padding:16px 45px;
font-size:20px;
color:white;
background:transparent;
border:2px solid #ff3b3b;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.enroll-btn:hover{
background:#ff3b3b;
box-shadow:0 0 20px #ff3b3b;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<img src="course51.jpg" class="course-img" id="courseImage">

<br>

<button class="enroll-btn" id="payBtn">
ENROLL NOW ₹51
</button>

<div class="hidden" id="paymentBox">

<form>
<script src="https://checkout.razorpay.com/v1/payment-button.js"
data-payment_button_id="pl_SRC6QrXaO1u6Lz"
async>
</script>
</form>

</div>

</div>

<script>

function openPayment(){
document.querySelector("#paymentBox form button").click();
}

document.getElementById("courseImage").onclick=openPayment;
document.getElementById("payBtn").onclick=openPayment;

</script>

</body>
</html>
