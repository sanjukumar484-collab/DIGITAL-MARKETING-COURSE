<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>₹51 Course</title>

<style>

body{
margin:0;
padding:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.container{
max-width:900px;
width:95%;
}

.course{
width:100%;
cursor:pointer;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);

}

.course:hover{
transform:scale(1.02);
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<img src="course.png" class="course" id="courseImg">

<div class="hidden" id="pay">

<form>
<script 
src="https://checkout.razorpay.com/v1/payment-button.js"
data-payment_button_id="pl_SRC6QrXaO1u6Lz"
async>
</script>
</form>

</div>

</div>

<script>

function openPayment(){
document.querySelector("#pay form button").click();
}

document.getElementById("courseImg").onclick=openPayment;

</script>

</body>
</html>
